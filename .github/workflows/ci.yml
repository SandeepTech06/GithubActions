name: Node.js CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4
        
        - name: Set up Node.js
          uses: actions/setup-node@v4
          with:
            node-version: 22

        - name: Install dependencies
          run: npm install


        - name: start server
          run: node app.js

        - name: close server
          run: kill $(lsof -t -i:3000)
        
        - name: Server closed successfully
          run : echo "Server closed successfully"

        - name: CI Passed 
          run: echo "Running CI Successfully..."